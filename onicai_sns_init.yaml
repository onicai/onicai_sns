# Configures SNS proposal-related fields. These fields define the initial values
# for some of the nervous system parameters related to SNS proposals. This will
# not affect all SNS proposals submitted to the newly created SNS.
Proposals:
    # The cost of making an SNS proposal that is rejected by the SNS neuron
    # holders. This field is specified as a token. For example: "1 token".
    rejection_fee: 1000 tokens

    # The initial voting period of an SNS proposal. A proposal's voting period
    # may be increased during its lifecycle due to the wait-for-quiet algorithm
    # (see details below). This field is specified as a duration. For example
    # "4 days".
    #
    # TODO: Do NOT confuse this with the ">= 7-day execution delay for the first
    # ~6 months" that Arthur (ArthurAlaska) proposed as an anti-early-capture
    # measure. That delay is the time a *passed* proposal waits before it is
    # executed -- a separate nervous-system parameter that is set via a
    # post-genesis governance proposal, not here. The two fields below only
    # govern how long a proposal stays *open for voting*.
    initial_voting_period: 4 days

    # The wait-for-quiet algorithm extends the voting period of a proposal when
    # there is a flip in the majority vote during the proposal's voting period.
    #
    # Without this, there could be an incentive to vote right at the end of a
    # proposal's voting period, in order to reduce the chance that people will
    # see and have time to react to that.
    #
    # If this value is set to 1 day, then a change in the majority vote at the
    # end of a proposal's original voting period results in an extension of the
    # voting period by an additional day. Another change at the end of the
    # extended period will cause the voting period to be extended by another
    # half-day, etc.
    #
    # The total extension to the voting period will never be more than twice
    # this value.
    #
    # For more information, please refer to
    # https://wiki.internetcomputer.org/wiki/NNS_Canisters#Proposal_decision_and_wait-for-quiet
    #
    # This field is specified as a duration. For example: "1 day".
    maximum_wait_for_quiet_deadline_extension: 1 day

# Configuration of SNS voting.
Neurons:
    # The minimum amount of SNS tokens to stake a neuron. This field is specified
    # as a token. For instance, "1 token".
    minimum_creation_stake: 50 tokens

# Configuration of SNS voting.
Voting:
    # The minimum dissolve delay a neuron must have to be able to cast votes on
    # proposals.
    #
    # Dissolve delay incentivizes neurons to vote in the long-term interest of
    # an SNS, as they are rewarded for longer-term commitment to that SNS.
    #
    # Users cannot access the SNS tokens used to stake neurons (until the neuron
    # is dissolved). This field is specified as a duration. For example: "6 months".
    minimum_dissolve_delay: 1 month

    # Configuration of voting power bonuses that are applied to neurons to
    # incentivize alignment with the best interest of the DAO. Note, these
    # bonuses multiply each other, so the increase in voting power due to
    # the dissolve delay bonus is used in the equation to increase voting
    # power for the age bonus.
    #
    # DESIGN (TODO: confirm by community consensus). These bonuses implement the
    # proposal from ArthurAlaska, who wrote verbatim:
    #
    #     "keep the locking period short (1 month tops), but the age bonus big"
    #
    # We translate that qualitative proposal into concrete parameters as follows:
    #   - Do NOT reward locking up tokens: the DissolveDelay bonus is set to 0%,
    #     and the minimum dissolve delay is kept short at 1 month. Holders never
    #     have to lock their tokens away for years to have full voting weight.
    #   - Instead, reward long-term holding: the Age bonus is set large (100%)
    #     over a long duration (4 years). Age only accrues while a neuron is in
    #     the non-dissolving state, so a holder can keep the short 1-month
    #     dissolve delay yet still earn the full bonus purely by holding and
    #     staking over years. Short lock, big age bonus -- exactly as proposed.
    MaximumVotingPowerBonuses:
        # Users with a higher dissolve delay are incentivized to take the
        # long-term interests of the SNS into consideration when voting. To
        # reward this long-term commitment, this bonus can be set to a
        # percentage greater than zero, which will result in neurons having
        # their voting power increased in proportion to their dissolve delay.
        #
        # For example, if the user has a dissolve delay of 6 months, and
        # the maximum dissolve delay duration (defined below as `duration`)
        # for the dissolve delay bonus is 12 months, and the maximum bonus
        # (defined as `bonus` below) is set to 10%, then that user’s voting
        # power will be 105% of their normal voting power based on staked
        # tokens (i.e. they will have a bonus of 5%). If the user increased
        # their dissolve delay to 9 months, they would get 107.5% of the normal
        # voting power of their tokens. And if they increased to 12 months, they
        # would get 110%. If they increase further, they get no additional bonus.
        #
        # If you do not want this bonus to be applied for neurons with higher
        # dissolve delay, set `bonus` to `0%` and those neurons will not receive
        # higher voting power.
        DissolveDelay:
            # This parameter sets the maximum dissolve delay a neuron can have.
            # When reached, the maximum dissolve delay bonus will be applied.
            # This field is specified as a duration. For example: "8 years".
            # RATIONALE: this value is ALSO the hard cap on any neuron's dissolve
            # delay (max_dissolve_delay_seconds), so it must be >= the longest
            # dissolve delay used anywhere. The binding case is the swap neuron
            # baskets (VestingSchedule 8 x 3mo needs (8-1)*3 = 21mo, and the SNS
            # requires (count-1)*interval < max_dissolve_delay); the team genesis
            # neurons use 9mo. We set 24 months to clear both. Because the bonus
            # below is 0%, a longer cap grants NO voting-power reward -- the
            # "short lock" intent (see DESIGN above) is preserved via bonus 0% +
            # the 1-month minimum_dissolve_delay.
            duration: 24 months
            # If a neuron's dissolve delay is `duration`, its voting power will
            # be increased by the dissolve delay `bonus` amount.
            # This field is specified as a percentage. For instance,
            # a value of "100%" means that the voting power will be doubled
            # (multiplied by 2).
            # Set to 0% -- we deliberately do not reward locking (see DESIGN above).
            bonus: 0%

        # Users with neurons staked in the non-dissolving state for a long
        # period of time are incentivized to take the long-term interests of
        # the SNS into consideration when voting. To reward this long-term
        # commitment, this bonus can be set to a percentage (greater than zero),
        # which will result in neurons having their voting power increased in
        # proportion to their age.
        #
        # For example, if the neuron has an age of 6 months, and the maximum age
        # duration (defined below as `duration`) for the age bonus is 12 months,
        # and the maximum bonus (defined as `bonus` below) is set to 10%, then
        # that neuron’s voting power will be 105% of their normal voting power
        # based on staked tokens plus dissolve delay bonus (i.e. they will have a
        # bonus of 5%). If neuron aged another 3 months to have an age of 9 months,
        # the neuron would get 107.5% of the normal voting power. And if the neuron
        # aged another 3 months to 12 months, the neuron would get 110%. If the neuron
        # ages further, it get no additional bonus.
        #
        # If this bonus should not be applied for older neurons, set the bonus
        # to `0%` and older neurons will not receive higher voting power.
        Age:
            # This parameter sets the duration of time the neuron must be staked
            # in the non-dissolving state, in other words its `age`, to reach
            # the maximum age bonus. Once this age is reached, the neuron will
            # continue to age, but no more bonus will be applied. This field
            # is specified as a duration. For example: "2 years".
            duration: 4 years
            # If a neuron's age is `duration` or older, its voting power will be
            # increased by this age`bonus` amount.
            # This field is specified as a percentage. For instance,
            # a value of "25%" means that the voting power will increase by a quarter
            # (multiplied by 1.25).
            # Set large -- a neuron aged 4 years has DOUBLE the voting power
            # (see DESIGN above: "the age bonus big").
            bonus: 100%

    # Configuration of SNS voting reward parameters.
    #
    # The voting reward rate controls how quickly the supply of the SNS token
    # increases. For example, setting `initial` to `2%` will cause the supply to
    # increase by at most `2%` per year. A higher voting reward rate
    # incentivizes users to participate in governance, but also results in
    # higher inflation.
    #
    # The initial and final reward rates can be set to have a higher reward rate
    # at the launch of the SNS and a lower rate further into the SNS’s lifetime.
    # The reward rate falls quadratically from the `initial` rate to the `final`
    # rate over the course of `transition_duration`.
    #
    # Setting both `initial` and `final` to `0%` will result in the system not
    # distributing voting rewards at all.
    #
    # More details on SNS tokenomics can be found in the developer documentation:
    # https://internetcomputer.org/docs/current/developer-docs/integrations/sns/tokenomics/rewards/#voting-rewards
    # No ONICAI voting rewards. ONICAI has a hard cap of 21M tokens, all of
    # which are distributed to existing FUNNAI holders and the remainder
    # rewarded to mAIners according to the funnAI minting schedule -- there is
    # no token inflation to fund staking rewards. In the future, the community
    # can decide via governance to funnel part of the application's ICP revenue
    # to stakers, but that is for the community to decide, not something set at
    # genesis.
    RewardRate:
        # The initial reward rate at which the SNS voting rewards will increase
        # per year. This field is specified as a percentage. For example: "15%".
        initial: 0%

        # The final reward rate at which the SNS voting rewards will increase
        # per year. This rate is reached after `transition_duration` and remains
        # at this level unless changed by an SNS proposal. This field is
        # specified as a percentage. For example: "5%".
        final: 0%

        # The voting reward rate falls quadratically from `initial` to `final`
        # over the time period defined by `transition_duration`.
        #
        # Values of 0 result in the reward rate always being `final`.
        #
        # This field is specified as a duration. For example: "8 years".
        transition_duration: 4 years

# Configuration of the initial token distribution of the SNS. You can configure
# how SNS tokens are distributed in each of the three groups:
# (1) tokens that are given to the original developers of the dapp,
# (2) treasury tokens that are owned by the SNS governance canister, and
# (3) tokens which are distributed to the decentralization swap participants.
#
# The initial token distribution must satisfy the following preconditions to be
# valid:
#    - The sum of all developer tokens in E8s must be less than `u64::MAX`.
#    - The Swap's initial balance (see group (3) above) must be greater than 0.
#    - The Swap's initial balance (see group (3) above) must be greater than or
#      equal to the sum of all developer tokens.
#
# NOTE on the third precondition above: it was removed from dfinity/ic master
# (rs/sns/init/src/distributions.rs), BUT it is STILL ENFORCED by the released
# tooling -- verified 2026-07 with `dfx sns init-config-file validate` on both
# dfx 0.29.2 and 0.32.0, which reject a config where the developer tokens exceed
# the swap. `dfx sns propose` builds the proposal through the same code path,
# and mainnet SNS-W validates it again on execution, so this rule is effectively
# BINDING. We satisfy it by keeping the only genesis (developer) neurons -- the
# team -- at or below the swap amount: team 315_000 = swap 315_000. The advisor
# (420_000) is delivered post-SNS, NOT as a genesis neuron, so it does not count
# toward the developer total.
Distribution:
    # =========================================================================
    # 21M ONICAI DISTRIBUTION + LIQUIDITY POOL GENERATION PLAN
    #
    # The full 21M ONICAI supply is minted at genesis:
    #   - genesis neurons:
    #       team    315_000  (4 x 78_750) -- each team member's 1:1 swap of
    #                        78_750 FUNNAI (burned) for 78_750 ONICAI held as
    #                        neurons (see the team neurons below). Set EQUAL to
    #                        the swap so developer tokens <= swap (SNS rule above).
    #   - swap:            315_000  (sold in the decentralization swap;
    #                        participants receive VESTED ONICAI neuron baskets)
    #   - treasury:        20_370_000  (everything else)
    #   The advisor (420_000, 2% for Outlier Ventures) is NOT a genesis neuron;
    #   it is delivered post-SNS from the treasury (see the sequence below).
    # The treasury is then distributed entirely via post-genesis SNS proposals
    # (see the sequence below). No new ONICAI is ever minted; "mAIning" going
    # forward is distribution from the pre-minted reserve.
    #
    # LIQUIDITY POOL GENERATION EVENT (LPGE): besides decentralizing the app,
    # this launch seeds an ONICAI/ICP liquidity pool on ICPSwap. The SNS does
    # NOT create any DEX pool automatically -- the decentralization swap only
    # collects ICP into the SNS treasury, and the DAO must seed the pool via a
    # post-genesis proposal. So the ONICAI budget for this event is split:
    #   - budget = 150_000 (funnAI treasury FUNNAI) + 900_000 (Scheduled minus
    #     Minted; the protocol is behind schedule) - 420_000 (advisor) = 630_000
    #   - SELL half, RESERVE half: to seed the pool at the SAME price the swap
    #     sold at, the reserved ONICAI must equal the sold ONICAI (the price
    #     cancels out), so 630_000 splits 315_000 / 315_000.
    #     * swap sells 315_000 ONICAI -> raises 315_000 x 0.006241 ~= 1_966 ICP
    #       (0.006241 = the fixed FUNNAI/ICP price, ~$0.0145; see PRE-SNS
    #       step 1); the ICP lands in the SNS treasury.
    #     * a post-genesis proposal pairs that ~1_966 ICP with 315_000 ONICAI
    #       from the treasury into an ONICAI/ICP pool on ICPSwap, at 0.006241.
    # WHY THE SWAP IS THIS SIZE AND CANNOT GROW: the swap, LP, and advisor
    # tokens all come from the MINTING DEFICIT (Scheduled - Minted, ~900_000 --
    # tokens the schedule expected to be mined by now but that were not) + the
    # FUNNAI tokens held by the funnAI treasury (~150_000). A swap is only
    # possible BECAUSE the protocol is behind schedule. The full pool is
    # 900_000 + 150_000 = 1_050_000, exactly consumed by advisor 420_000 +
    # swap 315_000 + LP 315_000. The swap CANNOT be enlarged: doing so would
    # spend tokens owed to on-schedule mAIning and break the 21M minting
    # schedule.
    # Design notes:
    #   - Voting power: the SNS rule (developer tokens <= swap, see the top of
    #     this section) forces the team's genesis neurons (315_000) to be no
    #     larger than the swap (315_000), so the team does NOT hold a raw genesis
    #     voting-power majority. Steering the DAO relies on the community
    #     FOLLOWING the team neuron (plus the 33% blocking rule) -- the intended
    #     SNS model -- not on out-voting everyone by stake.
    #   - No liquid ONICAI outside the treasury: swap participants receive
    #     vested neuron baskets (not liquid), and the SNS itself seeds the pool
    #     at the FUNNAI price, so no one can pre-create a mispriced pool.
    #
    # The current Minted, Burned and Circulating FUNNAI supply figures are live
    # at:  https://myfunnai.app/supply
    # Placeholder values below are today's snapshot (2026-07-09):
    #   Minted      = 6_001_362 FUNNAI   (hard cap 21M; Scheduled ~6.9M)
    #   Burned      =   439_011 FUNNAI   (7.3% of Minted)
    #   Circulating = 5_562_352 FUNNAI   (Minted - Burned, rounded to whole tokens)
    # TODO: refresh Minted / Burned / Circulating from myfunnai.app/supply at
    # the actual migration time; use the FIXED FUNNAI/ICP price (PRE-SNS step 1),
    # NOT the live pool price; then recompute every amount below. The swap size is DERIVED from the minting deficit at pause
    # time (see "WHY THE SWAP IS THIS SIZE" above), not a free parameter --
    # recompute it from the then-current (Scheduled - Minted) deficit plus the
    # FUNNAI held by the funnAI treasury. The ICP figures follow from the
    # FUNNAI/ICP price.
    #
    # PRE-SNS SEQUENCE (before submitting the NNS proposal / launching).
    # NOTE: the funnAI protocol is NOT paused here -- mAIning keeps running right
    # through the launch (proposal, genesis, swap) until the FUNNAI -> ONICAI
    # switch in the post-genesis sequence. There is no need to pause earlier.
    #   1. Use a FIXED FUNNAI price, decided now, rather than reading it live
    #      from the ICPSwap pool. A thin live pool price could be manipulated,
    #      so we fix the price up front. We use today's FUNNAI price of ~$0.0145;
    #      converted to FUNNAI/ICP at the ICP price it gives the figure used
    #      below (0.006241 placeholder). This fixed price sets the swap ceiling
    #      (maximum_direct_participation_icp) and the LP seed price.
    #   2. Finalize ALL placeholder values in this file from the current supply
    #      figures and the minting deficit (the genesis distribution -- team,
    #      swap, treasury -- is fixed here). Because mAIning keeps running, these
    #      are a planning estimate: the FINAL Minted / Burned / Circulating
    #      snapshot that sizes the redemption reserve is taken at the pause in
    #      the post-genesis sequence.
    #
    # POST-GENESIS SEQUENCE (each step is an SNS proposal / protocol action).
    # ORDER MATTERS: the liquidity pool (step 4) must be created BEFORE any
    # liquid ONICAI enters circulation (steps 5-7), otherwise someone could
    # stand up a mis-priced ONICAI/ICP pool first.
    #   1. Pause the funnAI protocol (mAIning + Bonfire burns) once ready to
    #      migrate -- this is the FUNNAI -> ONICAI switch point -- and take the
    #      final Minted / Burned / Circulating snapshot (they stop changing once
    #      paused). Circulating counts FUNNAI everywhere (wallets, pools, stakes,
    #      farms), so no pool draining is needed to know the count.
    #   2. Team members complete their 1:1 swap: each burns the 78_750 FUNNAI
    #      they pledged, in return for the 78_750 ONICAI held as their genesis
    #      neurons (4 x 78_750 = 315_000 FUNNAI burned / ONICAI in neurons).
    #   3. Burn ONICAI = (total FUNNAI Burned) - 315_000
    #        = (439_011 + 315_000) - 315_000 = 439_011 ONICAI.
    #      Only the pure Burned (Bonfire) amount shrinks ONICAI supply; the
    #      team's 315_000 and every later redemption are 1:1 conversions and
    #      are therefore excluded.
    #   4. Seed the ONICAI/ICP pool on ICPSwap FIRST: pair the ~1_966 ICP raised
    #      in the swap (now in the SNS treasury) with 315_000 ONICAI from the
    #      treasury, at the 0.006241 price. Do this before steps 5-7.
    #   5. Deliver the advisor allocation: 420_000 ONICAI (2% for Outlier
    #      Ventures) from the treasury. TODO: investigate delivering this as
    #      staked NEURONS rather than liquid tokens.
    #   6. Send ONICAI = Circulating minus the team burn to the redemption
    #      canister, then holders migrate: each withdraws their FUNNAI from the
    #      ICPSwap pool / stakes / farms into their own wallet and swaps it 1:1
    #      for ONICAI at the redemption canister:
    #        5_562_352 - 315_000 = 5_247_352 ONICAI.
    #   7. Send the treasury remainder to the funnAI GameState canister, to be
    #      distributed as mAIning rewards to the mAIners:
    #        20_370_000 - 439_011 - 315_000 - 420_000 - 5_247_352 = 13_948_637 ONICAI.
    #   8. Upgrade the funnAI application canisters to use the new ONICAI token
    #      ledger and index canister.
    #   9. Upgrade the funnAI application to distribute ONICAI tokens as mAIner
    #      rewards.
    #  10. Unpause the funnAI protocol. It now runs fully on the ONICAI token.
    #
    # Conservation -- all 21M accounted for:
    #   team neurons          315_000   (1:1 swap of owned FUNNAI for ONICAI)
    #   swap                  315_000   (to swap participants, vested neurons)
    #   burned                439_011   (removed from supply)
    #   liquidity pool        315_000   (from treasury, paired with raised ICP)
    #   advisor               420_000   (post-SNS delivery, 2% Outlier Ventures)
    #   redemption reserve  5_247_352   (for 1:1 swap by current FUNNAI holders)
    #   GameState (mAIning) 13_948_637
    #   -----------------------------
    #   total              21_000_000
    # Note: the advisor 420_000, the swap 315_000, and the LP 315_000 are fresh
    # (non-FUNNAI-backed) allocations drawn from the mAIning pool, so GameState
    # receives correspondingly less than the full unmined amount
    # (21M - Minted = 14_998_638).
    #
    # Redemption canister admin/controller = SNS root / governance, not a team
    # principal.
    # =========================================================================
