    # Must be a string of 10 to 2,048 bytes.
    # The protocol must be HTTPS, and the domain must be forum.dfinity.org.
    # TODO: create a new forum thread and paste its URL here.
    url: "https://forum.dfinity.org/t/upcoming-onicai-sns-decentralization-swap/61361"

    # The description of the proposal. Must be a string of 10 to 2,000 bytes.
    # TODO before submission: update the forum-post and whitepaper links, and
    # refresh any figures once the FUNNAI snapshot is final.
    summary: |
        ## onicai SNS
        This SNS decentralizes the funnAI application (https://funnai.onicai.com)
        by handing it to the onicai community. Existing FUNNAI holders migrate
        1:1 to the ONICAI governance token; all funnAI features are preserved,
        and the application keeps mAIning ONICAI on the same schedule. ONICAI
        has a 21M hard cap and becomes deflationary via burns once mAIning ends
        in 2033.

        ## Token
        * Total supply: 21,000,000 ONICAI (hard cap)
        * Transaction fee: 0.1 ONICAI
        * Proposal rejection fee: 1,000 ONICAI
        * Neurons' Fund participation: No

        ## Decentralization Swap & Liquidity Pool Generation
        * The swap sells 315,000 ONICAI for ICP; participants receive vested
          ONICAI neurons
        * All ICP raised is paired with treasury ONICAI into an ONICAI/ICP
          liquidity pool on ICPSwap, at the current FUNNAI price
        * No lower bound on ICP, so the swap cannot fail on a minimum

        ## Voting
        * Dissolve delay: min 1 month; bonus 0% (holding, not locking, is rewarded)
        * Age bonus 100% over 4 years; voting reward rate 0% (no ONICAI inflation)

        ## Genesis Allocation (21M ONICAI)
        * Team neurons: 315,000 (each member's 1:1 swap of pledged FUNNAI, burned)
        * Decentralization swap: 315,000
        * SNS treasury: 20,370,000

        The Advisor and swap tokens come from the Scheduled - Minted FUNNAI (the
        protocol is running behind schedule) plus the FUNNAI held by the funnAI
        treasury. See https://myfunnai.app/supply

        ## Post-Genesis Distribution (via SNS proposals)
        The complete treasury is distributed after genesis: an amount matching
        the burned FUNNAI is burned; ONICAI is paired with the raised ICP to
        seed the liquidity pool; the advisor's 420,000 is delivered; the
        circulating amount is sent to the redemption canister for 1:1 holder
        swaps; and the remainder funds mAIning rewards via the funnAI GameState
        canister.

        ## Learn more
        * [onicai on OpenChat](https://oc.app/community/mepna-eqaaa-aaaar-bclua-cai/channel/2881126157)
        * [onicai on X](https://x.com/onicaiHQ)
        * [onicai on Github](https://github.com/onicai)

